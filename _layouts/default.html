<!DOCTYPE html>
<html lang="zh-CN">

  <!-- 引入 head 部分（包含 meta 标签、CSS 链接等） -->
  {% include head.html %}

  <body>
    <!-- 页面容器 -->
    <div class="page-wrapper">

      <!-- 引入顶部导航栏 -->
      {% include header.html %}

      <!-- 主内容区域 -->
      <main class="main-content" role="main">
        {{ content }}
      </main>

      <!-- 引入页脚 -->
      {% include footer.html %}

    </div>

    <!-- 引入 JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
