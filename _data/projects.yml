# 项目列表（按时间倒序）
projects:
  - title: 电商平台前端重构
    period: 2023.09 - 2024.02
    tech_stack:
      - React
      - Next.js
      - TypeScript
      - Tailwind CSS
    description: |
      负责公司核心电商平台的前端架构重构，将原有 jQuery 技术栈迁移至 Next.js，
      实现服务端渲染（SSR）以提升首屏加载性能和 SEO 表现。
      同时重构了商品详情页、购物车、订单流程等核心模块的组件化设计。
    achievements:
      - 首屏加载时间从 3.2s 优化至 1.1s，LCP 指标提升 65%
      - SEO 自然搜索流量提升 40%，核心关键词排名进入前 3 页
      - 组件复用率达到 75%，新功能开发效率提升 30%

  - title: 物联网数据可视化大屏
    period: 2023.03 - 2023.08
    tech_stack:
      - Vue 3
      - D3.js
      - WebSocket
      - ECharts
    description: |
      为智能制造园区开发实时监控数据可视化大屏系统，支持多设备并发数据接入、
      实时图表渲染和异常告警推送。负责前端架构设计、图表组件封装和性能优化。
    achievements:
      - 支持 5000+ 设备同时在线，数据延迟控制在 200ms 以内
      - 自研图表组件库覆盖 15 种常用工业可视化场景
      - 项目成功部署于 3 个园区，获得客户高度评价
