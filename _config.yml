# ============================================
# 网站基础信息配置
# ============================================

# 网站标题（显示在浏览器标签和页面头部）
title: "Egan's Personal Page"

# 副标题/一句话介绍
description: "Ai infra Learning"

# 你的邮箱
email: 443462147@qq.com

# 网站域名（GitHub Pages 会自动配置，本地开发时可留空）
# url: "https://your-username.github.io"

# 作者信息（用于 SEO 和元数据）
author:
  name: Egan
  email: 443462147@qq.com
  github: tbd
  linkedin: tbd
  location: 深圳, 中国

# ============================================
# Jekyll 构建设置
# ============================================

# 使用的主题（可选，如果不使用远程主题则留空）
# theme: minima

# 插件（GitHub Pages 白名单内的插件）
plugins:
  - jekyll-feed      # 生成 RSS 订阅
  - jekyll-sitemap   # 生成站点地图（利于 SEO）
  - jekyll-seo-tag   # 自动生成 SEO 标签

# 排除文件（这些文件不会被构建到最终网站）
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - cv-website.zip

# ============================================
# 自定义集合配置
# ============================================

# 笔记集合：_notes/ 目录下的文章
collections:
  notes:
    output: true          # 生成独立的 HTML 页面
    permalink: /notes/:title/  # 输出路径格式

# 默认 Front Matter（为所有文件设置默认值）
defaults:
  -
    scope:
      path: ""        # 应用到所有文件
      type: "pages"   # 仅页面类型
    values:
      layout: "default"  # 默认使用 default 布局
  -
    scope:
      path: ""        # 应用到所有文件
      type: "notes"   # 仅笔记类型
    values:
      layout: "note"  # 笔记默认使用 note 布局
