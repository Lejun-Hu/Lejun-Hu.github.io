<!-- 顶部导航栏 -->
<header class="site-header">
  <div class="container">

    <!-- Logo/名字 -->
    <a class="site-title" href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>

    <!-- 导航菜单 -->
    <nav class="site-nav">
      <!-- 桌面端导航链接 -->
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}#about" class="nav-link">关于我</a>
        <a href="{{ '/' | relative_url }}#experience" class="nav-link">工作经历</a>
        <a href="{{ '/' | relative_url }}#skills" class="nav-link">技能</a>
        <a href="{{ '/' | relative_url }}#projects" class="nav-link">项目</a>
        <a href="{{ '/notes/' | relative_url }}" class="nav-link">笔记</a>
        <a href="{{ '/' | relative_url }}#contact" class="nav-link">联系方式</a>
      </div>

      <!-- 主题切换按钮 -->
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="切换主题" onclick="toggleTheme()">
        <span class="theme-icon-light" aria-hidden="true">☀️</span>
        <span class="theme-icon-dark" aria-hidden="true">🌙</span>
      </button>

      <!-- 移动端汉堡菜单按钮（小屏幕显示） -->
      <button class="menu-toggle" aria-label="切换菜单" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>

  </div>
</header>
